root = "."
tmp_dir = "tmp"

[build]
  bin = "tmp\\manager.exe"
  cmd = "go build -tags dev -o tmp/manager.exe main.go"
  delay = 1000
  exclude_dir = ["tmp", "site", "pb_data", "build", "vendor", ".vscode"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = "2s"
  send_interrupt = true
  stop_on_error = true
  args_bin = ["serve", "--http=0.0.0.0:8090"]

[log]
  time = false

[misc]
  clean_on_exit = true
